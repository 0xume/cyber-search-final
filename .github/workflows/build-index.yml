name: Build index & deploy

# Publishes the static site + index.json to GitHub Pages.
# The index is rebuilt on each run, but we NEVER publish a smaller index than
# the one committed to the repo: a fresh build is only used if it has at least
# as many entries as the committed full build (live feeds only expose recent
# posts, so a CI rebuild alone is much smaller than the deep sitemap build).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r indexer/requirements.txt

      - name: Run pipeline smoke test
        working-directory: indexer
        run: python test_pipeline.py

      - name: Build index (keep the larger of committed vs fresh)
        run: |
          cp site/index.json site/index.committed.json
          ( python indexer/indexer.py --pretty --out site/index.fresh.json \
            || python indexer/indexer.py --sample --pretty --out site/index.fresh.json ) || true
          python - <<'PY'
          import json, os, shutil
          def count(p):
              try:
                  return json.load(open(p))["counts"]["entries"]
              except Exception:
                  return -1
          committed = count("site/index.committed.json")
          fresh = count("site/index.fresh.json")
          print(f"committed={committed} fresh={fresh}")
          if fresh >= committed and fresh > 0:
              shutil.move("site/index.fresh.json", "site/index.json")
              print(f"Using fresh build ({fresh} entries)")
          else:
              shutil.move("site/index.committed.json", "site/index.json")
              print(f"Keeping committed build ({committed} entries) — fresh was smaller")
          for tmp in ("site/index.fresh.json", "site/index.committed.json"):
              if os.path.exists(tmp):
                  os.remove(tmp)
          PY

      - name: Validate index against schema
        run: |
          python - <<'PY'
          import json, jsonschema
          idx = json.load(open("site/index.json"))
          schema = json.load(open("schema/index.schema.json"))
          jsonschema.validate(idx, schema)
          print(f"OK: {idx['counts']['entries']} entries validate")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
